name: Publish to Marketplace

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npx @vscode/vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }}
