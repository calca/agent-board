<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .dark { fill: #444444; }
    .mid { fill: #888888; }
    .light { fill: #CCCCCC; }
  </style>

  <!-- Left module -->
  <rect class="dark" x="30" y="36" width="16" height="56" rx="5"/>

  <!-- Center module (primary / active) -->
  <rect class="light" x="56" y="28" width="16" height="72" rx="5"/>

  <!-- Right module -->
  <rect class="mid" x="82" y="44" width="16" height="48" rx="5"/>
</svg>